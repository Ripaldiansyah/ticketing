version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ticketing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: event_ticketing
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ticketing-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Application
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ticketing-api
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=event_ticketing
      - DB_USERNAME=laravel
      - DB_PASSWORD=laravel
      - QUEUE_CONNECTION=database
      - WA_GATEWAY_URL=http://wa-gateway:3001
      - WA_GATEWAY_KEY=your-secret-api-key
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ticketing-network

  # Laravel Queue Worker
  queue:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ticketing-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=event_ticketing
      - DB_USERNAME=laravel
      - DB_PASSWORD=laravel
      - QUEUE_CONNECTION=database
      - WA_GATEWAY_URL=http://wa-gateway:3001
      - WA_GATEWAY_KEY=your-secret-api-key
    volumes:
      - ./apps/api:/var/www/html
      - /var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ticketing-network

  # WhatsApp Gateway
  wa-gateway:
    build:
      context: ./apps/wa-gateway
      dockerfile: Dockerfile
    container_name: ticketing-wa-gateway
    restart: unless-stopped
    environment:
      - PORT=3001
      - API_KEY=your-secret-api-key
    ports:
      - "3001:3001"
    volumes:
      - wa_auth_data:/app/.wwebjs_auth
    networks:
      - ticketing-network

volumes:
  mysql_data:
  wa_auth_data:

networks:
  ticketing-network:
    driver: bridge
